<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Primera Web</title>

  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      text-align:center;
    }

    .box{
      background:#1f1f1f;
      padding:40px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(255,255,255,0.1);
    }

    h1{
      font-size:3rem;
    }

    p{
      opacity:0.8;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🚀 Mi página ya está online</h1>
    <p>Sobreviví a HTML y ahora tengo una web.</p>
  </div>

</body>
</html>
